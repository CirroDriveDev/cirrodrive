name: cirrodrive
services:
  frontend:
    image: zetabs/cirrodrive:frontend
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: cirrodrive-frontend
    ports:
      - "${CLIENT_PORT}:80"
    restart: always
    environment:
      - TZ=Asia/Seoul
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

  backend:
    image: zetabs/cirrodrive:backend
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cirrodrive-backend
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    restart: always
    environment:
      - SERVER_PORT=${SERVER_PORT}
      - CLIENT_PORT=${CLIENT_PORT}
      - EC2_PUBLIC_URL=${EC2_PUBLIC_URL}
      - JWT_SECRET=${JWT_SECRET}
      - AWS_REGION=${AWS_REGION}
      - AWS_SES_SOURCE_EMAIL=${AWS_SES_SOURCE_EMAIL}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - TOSS_SECRET_KEY=${TOSS_SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  cirrodrive-app-data:
    external: false
