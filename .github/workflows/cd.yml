name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  check-ci-status:
    name: Check CI Status
    runs-on: ubuntu-22.04
    if: >-
      github.event_name == 'workflow_dispatch' || 
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get workflow details
        if: github.event_name == 'workflow_run'
        run: |
          echo "CI 파이프라인이 성공적으로 완료되었습니다."
          echo "워크플로우 ID: ${{ github.event.workflow_run.id }}"
          echo "워크플로우 이름: ${{ github.event.workflow_run.name }}"
          echo "브랜치: ${{ github.event.workflow_run.head_branch }}"

      - name: Manual trigger info
        if: github.event_name == 'workflow_dispatch'
        run: echo "CD 파이프라인이 수동으로 실행되었습니다."

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-22.04
    needs: check-ci-status
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # 최적화: 불필요한 Git 히스토리 가져오지 않음

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./apps/backend/Dockerfile
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:backend-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:backend-cache,mode=max
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:backend

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: ./apps/frontend/Dockerfile
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:frontend-cache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:frontend-cache,mode=max
          secrets: |
            VITE_API_HOST=cirrodrive.kro.kr
            VITE_API_PORT=8000
            VITE_TOSS_CLIENT_KEY=test_ck_d46qopOB892JAe2jwoQY3ZmM75y0
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:frontend

  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-22.04
    needs: build-and-push
    environment: production
    steps:
      - name: Prepare Docker Environment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 배포 디렉토리 확인 및 생성
            mkdir -p /home/${{ secrets.SERVER_USER }}/cirrodrive-deploy

            # Docker 이미지 최신 버전 가져오기
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:backend || { echo "백엔드 이미지 가져오기 실패"; exit 1; }
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:frontend || { echo "프론트엔드 이미지 가져오기 실패"; exit 1; }

  database-update:
    name: Update Database
    runs-on: ubuntu-22.04
    needs: prepare-release
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Run Database Migrations via Docker Container
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DATABASE_URL
          script: |
            echo "백엔드 컨테이너를 사용하여 데이터베이스 마이그레이션 실행 중..."

            # 임시 마이그레이션 컨테이너 실행
            docker run --rm \
            --name temp-migration-container \
            -e DATABASE_URL="${DATABASE_URL}" \
            -e NODE_ENV="production" \
            ${{ secrets.DOCKERHUB_USERNAME }}/cirrodrive:backend \
            sh -c "echo '마이그레이션 시작...' && pnpm run db:push && pnpm run db:seed"

            # 실행 결과 확인
            if [ $? -eq 0 ]; then
              echo "✅ 데이터베이스 마이그레이션 성공"
            else
              echo "❌ 데이터베이스 마이그레이션 실패"
              exit 1
            fi

  deployment:
    name: Deployment
    runs-on: ubuntu-22.04
    needs: database-update
    environment: production
    env:
      NODE_ENV: production
      APP_SERVER_PORT: 8000
      APP_CLIENT_PORT: 80
      APP_PUBLIC_HOST: cirrodrive.kro.kr
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET }}
      AUTH_DEFAULT_ADMIN_USERNAME: ${{ secrets.AUTH_DEFAULT_ADMIN_USERNAME }}
      AUTH_DEFAULT_ADMIN_PASSWORD: ${{ secrets.AUTH_DEFAULT_ADMIN_PASSWORD }}
      AWS_REGION: ap-northeast-2
      AWS_SES_SOURCE_EMAIL: ${{ secrets.AWS_SES_SOURCE_EMAIL }}
      AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
      PAYMENT_TOSS_SECRET_KEY: ${{ secrets.PAYMENT_TOSS_SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docker-compose.yml
          sparse-checkout-cone-mode: false
          fetch-depth: 1 # 최적화: 불필요한 Git 히스토리 가져오지 않음

      - name: Copy Docker Compose file to server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SERVER_USER }}/cirrodrive-deploy"
          overwrite: true

      - name: Deploy and Start Containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: NODE_ENV,APP_SERVER_PORT,APP_CLIENT_PORT,APP_PUBLIC_HOST,DATABASE_URL,AUTH_JWT_SECRET,AUTH_DEFAULT_ADMIN_USERNAME,AUTH_DEFAULT_ADMIN_PASSWORD,AWS_REGION,AWS_SES_SOURCE_EMAIL,AWS_S3_BUCKET,PAYMENT_TOSS_SECRET_KEY
          script: |
            # 작업 디렉토리로 이동
            cd /home/${{ secrets.SERVER_USER }}/cirrodrive-deploy

            # Docker 컨테이너 재시작
            docker-compose down
            docker-compose up -d || { echo "Docker 컨테이너 시작 실패"; exit 1; }

  validate-deployment:
    name: Validate Deployment
    runs-on: ubuntu-22.04
    needs: deployment
    environment: production
    env:
      APP_SERVER_PORT: 8000
      APP_CLIENT_PORT: 80
      APP_PUBLIC_HOST: cirrodrive.kro.kr
    steps:
      - name: Check Deployment Status
        id: check_status
        run: |
          # 서비스 시작 대기
          sleep 10

          # 백엔드 헬스 체크
          BACKEND_ENDPOINT="http://$APP_PUBLIC_HOST:$APP_SERVER_PORT/health"

          # 백엔드 검증
          for i in {1..3}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" $BACKEND_ENDPOINT)
            if [ "$RESPONSE" = "200" ]; then
              echo "backend_status=success" >> $GITHUB_OUTPUT
              break
            elif [ $i -lt 3 ]; then
              sleep 5
            else
              echo "backend_status=failure" >> $GITHUB_OUTPUT
            fi
          done

      - name: Verify Docker Containers
        if: steps.check_status.outputs.backend_status == 'failure'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 문제 발생 시 컨테이너 상태 확인
            docker ps
            docker logs cirrodrive-backend --tail 15

      - name: Validate Results
        run: |
          if [[ "${{ steps.check_status.outputs.backend_status }}" != "success" ]]; then
            echo "❌ 백엔드 서비스 헬스 체크 실패"
            exit 1
          fi

          echo "🚀 배포 완료"

  notify:
    name: Notify Discord
    runs-on: ubuntu-22.04
    needs:
      [
        build-and-push,
        prepare-release,
        database-update,
        deployment,
        validate-deployment,
      ]
    if: always()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get commit info
        id: commit-info
        run: |
          echo "commit_message=$(git log -1 --pretty=%B)" >> $GITHUB_OUTPUT
          echo "commit_time=$(git log -1 --pretty=%cI)" >> $GITHUB_OUTPUT

      - name: Set deployment status
        id: deployment-status
        run: |
          # 모든 작업 성공 여부 확인
          ALL_SUCCESS=true
          FAILED_JOBS=""

          for job in "build-and-push" "prepare-release" "database-update" "deployment" "validate-deployment"; do
            if [[ "${{ needs[job].result }}" != "success" ]]; then
              ALL_SUCCESS=false
              FAILED_JOBS="${FAILED_JOBS}• ${job}\\n"
            fi
          done

          if $ALL_SUCCESS; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "color=3066993" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "color=15158332" >> $GITHUB_OUTPUT
          fi

          echo "failed_jobs=${FAILED_JOBS}" >> $GITHUB_OUTPUT

      - name: Notify discord success
        if: steps.deployment-status.outputs.status == 'success'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "🚀 배포 성공"
          description: |
            **환경:** Production
            **커밋:** ${{ steps.commit-info.outputs.commit_message }}
            **브랜치:** ${{ github.ref_name }}
            **작성자:** ${{ github.actor }}
            **시간:** ${{ steps.commit-info.outputs.commit_time }}

          color: ${{ steps.deployment-status.outputs.color }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

      - name: Notify discord failure
        if: steps.deployment-status.outputs.status == 'failure'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          title: "❌ 배포 실패"
          description: |
            **환경:** Production
            **커밋:** ${{ steps.commit-info.outputs.commit_message }}
            **브랜치:** ${{ github.ref_name }}
            **작성자:** ${{ github.actor }}
            **시간:** ${{ steps.commit-info.outputs.commit_time }}

            **실패한 작업:**
            ${{ steps.deployment-status.outputs.failed_jobs }}
          color: ${{ steps.deployment-status.outputs.color }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
